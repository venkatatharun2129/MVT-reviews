<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<h1>Admin Login</h1>

<form id="loginForm">
  <input
    type="text"
    id="username"
    placeholder="Username"
    required
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <button type="submit">
    Login
  </button>
</form>

<script>
document
.getElementById("loginForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  const res = await fetch(
    "/api/admin/login",
    {
      method: "POST",
      headers: {
        "Content-Type":
        "application/json"
        
      },
       credentials: "same-origin",
      body: JSON.stringify({
        username,
        password
      })
    }
  );

  const data = await res.json();

  if(data.success){
    window.location.href =
      data.redirect;
  }else{
    alert(data.message);
  }
});
</script>

</body>
</html>
