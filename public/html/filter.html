<!DOCTYPE html>
<html>
<head>
  <title>Movie Filter</title>
  <link rel="stylesheet" href="/css/filter.css"/>
</head>
<body>
  <div class="container">

<h2>🎬 Movie Filter</h2>

<div class="filters">

  <select id="category">

  <option value="">Select Category</option>

  <option value="Action">Action</option>
  <option value="Adventure">Adventure</option>
  <option value="Animation">Animation</option>
  <option value="Biography">Biography</option>
  <option value="Comedy">Comedy</option>
  <option value="Crime">Crime</option>
  <option value="Documentary">Documentary</option>
  <option value="Drama">Drama</option>
  <option value="Family">Family</option>
  <option value="Fantasy">Fantasy</option>
  <option value="History">History</option>
  <option value="Horror">Horror</option>
  <option value="Music">Music</option>
  <option value="Mystery">Mystery</option>
  <option value="Romance">Romance</option>
  <option value="Romantic Comedy">Romantic Comedy</option>
  <option value="Sci-Fi">Sci-Fi</option>
  <option value="Sport">Sport</option>
  <option value="Thriller">Thriller</option>
  <option value="War">War</option>
  <option value="Western">Western</option>

  <option value="Action Comedy">Action Comedy</option>
  <option value="Action Adventure">Action Adventure</option>
  <option value="Superhero">Superhero</option>
  <option value="Dark Comedy">Dark Comedy</option>
  <option value="Psychological Thriller">Psychological Thriller</option>
  <option value="Crime Thriller">Crime Thriller</option>
  <option value="Historical Drama">Historical Drama</option>
  <option value="War Drama">War Drama</option>
  <option value="Fantasy Adventure">Fantasy Adventure</option>
  <option value="Science Fantasy">Science Fantasy</option>
  <option value="Teen">Teen</option>
  <option value="Kids">Kids</option>
  <option value="Family Drama">Family Drama</option>
  <option value="Biographical Drama">Biographical Drama</option>
  <option value="Spy">Spy</option>
  <option value="Heist">Heist</option>
  <option value="Zombie">Zombie</option>
  <option value="Vampire">Vampire</option>
  <option value="Supernatural">Supernatural</option>
  <option value="Martial Arts">Martial Arts</option>
  <option value="Noir">Noir</option>
  <option value="Musical">Musical</option>

  </select>

  <select id="year">
    <option value="">All Years</option>
    <option value="2026">2026</option>
    <option value="2025">2025</option>
    <option value="2024">2024</option>
    <option value="2023">2023</option>
    <option value="2022">2022</option>
    <option value="2021">2021</option>
    <option value="2020">2020</option>
    <option value="2019">2019</option>
    <option value="2018">2018</option>
    <option value="2017">2017</option>
    <option value="2016">2016</option>
    <option value="2015">2015</option>
    <option value="2014">2014</option>
    <option value="2013">2013</option>
    <option value="2012">2012</option>
    <option value="2011">2011</option>
    <option value="2010">2010</option>
    <option value="2009">2009</option>
    <option value="2008">2008</option>
    <option value="2007">2007</option>
    <option value="2006">2006</option>
    <option value="2005">2005</option>
    <option value="2004">2004</option>
    <option value="2003">2003</option>
    <option value="2002">2002</option>
    <option value="2001">2001</option>
  </select>

  <select id="language">
    <option value="">All Languages</option>
    <option value="Telugu">Telugu</option>
    <option value="Telugu Dubbed">Telugu Dubbed</option>
    <option value="Hindi">Hindi</option>
    <option value="English">English</option>

  </select>

  <button onclick="getMovies()">Search</button>
  </div>

  <div id="movieList"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const selectedCategory = params.get("category");
    const selectedYear = params.get("year");
    const selectedLanguage = params.get("language");

    if (selectedCategory) {
      document.getElementById("category").value = selectedCategory;
    }

    if (selectedYear) {
      document.getElementById("year").value = selectedYear;
    }

    if (selectedLanguage) {
      document.getElementById("language").value = selectedLanguage;
    }

    getMovies();

    async function getMovies() {
      const category = document.getElementById("category").value;
      const year = document.getElementById("year").value;
      const language = document.getElementById("language").value;

      let url = "/api/movies/filter?";

      if (category) url += `category=${category}&`;
      if (year) url += `year=${year}&`;
      if (language) url += `language=${language}&`;

      const res = await fetch(url);
      const movies = await res.json();

      const container = document.getElementById("movieList");
      container.innerHTML = "";

      movies.forEach(movie => {
        container.innerHTML += `
       <a href="/movie/${movie._id}" class="movie-card">
  <img
    src="${movie.poster}"
    alt="${movie.title}"
    referrerpolicy="no-referrer"
  >

  <div class="movie-info">
    <h1>${movie.title}</h1>
    <p class="rating">
      ⭐ ${movie.rating?.toFixed(1) || "N/A"}/10
    </p>
  </div>
</a>`;

      });
    }
  </script>
</body>
</html>
