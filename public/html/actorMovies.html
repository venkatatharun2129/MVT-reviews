<!doctype html>
<html>

<head>
<title>Actor Movies</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

#movieList{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.movie-card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  transition:.3s;
}

.movie-card:hover{
  transform:translateY(-4px);
}

.movie-card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  display:block;
}

.movie-card h1{
  padding:10px;
  font-size:15px;
  text-align:center;
}

.movie-card p{
  text-align:center;
  padding-bottom:10px;
  color:#fbbf24;
}
</style>

</head>

<body>

<h1 id="actorName">Loading...</h1>

<div id="movieList"></div>

<script>
const actorId = window.location.pathname.split("/")[2];

const movieList = document.getElementById("movieList");
const actorName = document.getElementById("actorName");

async function fetchActorMovies(){

  const response = await fetch(`/api/actors/${actorId}`);
  const data = await response.json();

  actorName.textContent = data.actor.name;

  movieList.innerHTML = "";

  data.movies.forEach(movie => {

    movieList.innerHTML += `
      <a href="/movie/${movie._id}" class="movie-card">

        <img
          src="${movie.poster}"
          alt="${movie.title}"
          referrerpolicy="no-referrer"
        >

        <h1>${movie.title}</h1>

        <p>⭐ ${movie.rating?.toFixed(1) || "N/A"}</p>

      </a>
    `;

  });
}

fetchActorMovies();
</script>

</body>
</html>
