<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Rated Movies</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 28px;
    }

    /* GRID */
    #movies {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* CARD */
    .movie-card {
      text-decoration: none;
      color: white;
      background: #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .movie-card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .movie-card img {
      width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  display:block;
    }

    .movie-info {
      padding: 12px;
    }

    .movie-info h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      text-align: left;
    }

    .rating {
      font-size: 14px;
      color: #ffd700;
    }
  </style>
</head>

<body>

<h1>🏆 Top Rated Movies</h1>
<div id="movies"></div>

<script>
async function loadTopRated() {
  const res = await fetch("/api/movies/top-rated");
  const movies = await res.json();

  document.getElementById("movies").innerHTML = movies.map(movie => `
    <a href="/movie/${movie._id}" class="movie-card">
      <img src="${movie.poster}" alt="${movie.title}" referrerpolicy="no-referrer">
      <div class="movie-info">
        <h1>${movie.title}</h1>
        <p class="rating">⭐ ${movie.rating?.toFixed(1) || "N/A"}/10</p>
      </div>
    </a>
  `).join("");
}

loadTopRated();
</script>

</body>
</html>
