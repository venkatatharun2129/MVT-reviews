<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ADD ACTOR adimin panel</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <h1>Actor Editing Panel</h1>
  <form id="updateForm">
    
  <input id="name" type="text" placeholder="name" required>
  <input id="image" type="text" placeholder="image url">
  <input id="age" type="number" placeholder="age">
<select name="" id="bio">
              <option value="TollyWood">TollyWood</option>
              <option value="HollyWood">HollyWood</option>
              <option value="BollyWood">BollyWood</option>
              <option value="KollyWood">KollyWood</option>
              <option value="MollyWood">MollyWood</option>
            </select>
            <select name="" id="gender"> <option value="Male">Male</option>
             <option value="Female">Female</option>
             </select>
              <select name"" id="type">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
  <button type="submit">EditActor</button>
  
  </form>
  <input id="actorSearch" type="text" placeholder="search....">
  <div id="actorResults"></div>
    <script src="/js/addActor.js"></script>
  <script>
const updateForm = document.getElementById("updateForm");
const actorId = new URLSearchParams(window.location.search).get("id");

// Auto fill actor details
async function fetchLatestActor() {
    try {
        const res = await fetch(`/api/actors/${actorId}`);

        if (!res.ok) throw new Error("Actor not found");

        const actor = await res.json();

        document.getElementById("name").value = actor.name || "";
        document.getElementById("image").value = actor.image || "";
        document.getElementById("age").value = actor.age || "";
        document.getElementById("bio").value = actor.bio || "";
        document.getElementById("gender").value = actor.gender || "";
        document.getElementById("type").value = actor.type || "";

    } catch (err) {
        console.error(err);
        alert("Unable to load actor.");
    }
}

// Load actor when page opens
if (actorId) {
    fetchLatestActor();
}

// Update actor
updateForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const actorData = {
        name: document.getElementById("name").value.trim(),
        image: document.getElementById("image").value.trim(),
        age: Number(document.getElementById("age").value),
        bio: document.getElementById("bio").value.trim(),
        gender: document.getElementById("gender").value.trim(),
        type: document.getElementById("type").value.trim()
    };

    try {
        const res = await fetch(`/api/actors/${actorId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(actorData)
        });

        if (!res.ok) throw new Error("Update failed");

        alert("Actor Updated Successfully ✅");
        fetchLatestActor();

    } catch (err) {
        console.error(err);
        alert("Failed to update actor.");
    }
});
</script>
  
</body>
</html>
